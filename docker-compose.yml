services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: videoupload
      POSTGRES_PASSWORD: videoupload_pass
      POSTGRES_DB: videoupload
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videoupload"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ENV: development
      LOG_LEVEL: info
      DATABASE_URL: "postgres://videoupload:videoupload_pass@postgres:5432/videoupload?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GOOGLE_REDIRECT_URL: "${GOOGLE_REDIRECT_URL:-http://localhost:8080/api/v1/auth/google/callback}"
      JWT_SECRET: "${JWT_SECRET:-this-is-a-development-jwt-secret-key-32chars}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-12345678901234567890123456789012}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
